<!DOCTYPE html>
<html lang="en-us">
	<head>
		<meta charset="utf-8">
			<title>Math Shooter</title>
			<link rel="shortcut icon" href="TemplateData/favicon.ico">
				<link rel="stylesheet" href="TemplateData/style.css">
					<style>
						* { margin: 0; padding: 0; box-sizing: border-box; }
						html, body {
						width: 100%; height: 100%;
						background: #000;
						display: flex;
						justify-content: center;
						align-items: center;
						overflow: hidden;
						}
						#unity-container {
						width: 100vw;
						height: 56.25vw; /* mantém 16:9 */
						max-height: 100vh;
						max-width: 177.78vh; /* mantém 16:9 */
						position: relative;
						}
						#unity-canvas {
						width: 100% !important;
						height: 100% !important;
						outline: none;
						}
					</style>
				</head>
	<body>
		<div id="unity-container" class="unity-desktop">
			<canvas id="unity-canvas" width="1920" height="1080" tabindex="0"></canvas>
			<div id="unity-loading-bar">
				<div id="unity-logo"></div>
				<div id="unity-progress-bar-empty">
					<div id="unity-progress-bar-full"></div>
				</div>
			</div>
			<div id="unity-warning"></div>
			<div id="unity-footer">
				<div id="unity-logo-title-footer"></div>
				<div id="unity-fullscreen-button"></div>
				<div id="unity-build-title">Math Shooter</div>
			</div>
		</div>
		<script>
			var canvas = document.querySelector("#unity-canvas");
			canvas.style.outline = "none";
			window.addEventListener('load', function() { canvas.focus(); });
			document.addEventListener('click', function() { canvas.focus(); });
			document.addEventListener('keydown', function() { canvas.focus(); });

			function unityShowBanner(msg, type) {
			var wb = document.querySelector("#unity-warning");
			function upd() { wb.style.display = wb.children.length ? 'block' : 'none'; }
			var d = document.createElement('div');
			d.innerHTML = msg;
			wb.appendChild(d);
			if (type == 'error') d.style = 'background:red;padding:10px;';
			else {
			if (type == 'warning') d.style = 'background:yellow;padding:10px;';
			setTimeout(function() { wb.removeChild(d); upd(); }, 5000);
			}
			upd();
			}

			var buildUrl = "Build";
			var config = {
			arguments: [],
			dataUrl:            buildUrl + "/docs.data",
			frameworkUrl:       buildUrl + "/docs.framework.js",
			codeUrl:            buildUrl + "/docs.wasm",
			streamingAssetsUrl: "StreamingAssets",
			companyName:        "UTFPR",
			productName:        "Math Shooter",
			productVersion:     "1.0",
			showBanner:         unityShowBanner,
			};

			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
			var meta = document.createElement('meta');
			meta.name = 'viewport';
			meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
			document.head.appendChild(meta);
			document.querySelector("#unity-container").className = "unity-mobile";
			canvas.className = "unity-mobile";
			}

			document.querySelector("#unity-loading-bar").style.display = "block";

			var script = document.createElement("script");
			script.src = buildUrl + "/docs.loader.js";
			script.onload = () => {
			createUnityInstance(canvas, config, (progress) => {
			document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
			}).then((unityInstance) => {
			document.querySelector("#unity-loading-bar").style.display = "none";
			document.querySelector("#unity-fullscreen-button").onclick = () => {
			unityInstance.SetFullscreen(1);
			};
			setTimeout(function() { canvas.focus(); }, 200);
			}).catch((msg) => { alert(msg); });
			};
			document.body.appendChild(script);
		</script>
	</body>
</html>
