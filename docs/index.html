<!DOCTYPE html>
<html lang="en-us">
	<head>
		<meta charset="utf-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
				<title>Math Shooter</title>
				<link rel="shortcut icon" href="TemplateData/favicon.ico">
					<style>
						* { margin: 0; padding: 0; box-sizing: border-box; }

						html, body {
						width: 100vw; height: 100vh;
						background: #000;
						overflow: hidden;
						display: flex;
						justify-content: center;
						align-items: center;
						}

						/* aviso rotação — só portrait mobile */
						#rotate-msg {
						display: none;
						position: fixed;
						top: 0; left: 0;
						width: 100%; height: 100%;
						background: #08080f;
						flex-direction: column;
						align-items: center;
						justify-content: center;
						gap: 20px;
						z-index: 9999;
						}
						#rotate-msg .icon { font-size: 4rem; animation: girar 2s ease-in-out infinite; }
						@keyframes girar {
						0%   { transform: rotate(0deg); }
						50%  { transform: rotate(90deg); }
						100% { transform: rotate(90deg); }
						}
						#rotate-msg p {
						color: #f97316;
						font-family: sans-serif;
						font-size: 1.1rem;
						text-align: center;
						letter-spacing: .05em;
						}

						/* portrait em mobile → mostra aviso */
						@media screen and (orientation: portrait) and (max-width: 1024px) {
						#rotate-msg { display: flex !important; }
						#unity-container { display: none !important; }
						}

						/* container sempre centralizado e proporcional 16:9 */
						#unity-container {
						position: relative;
						/* ocupa o máximo possível sem distorcer */
						width:  min(100vw, 177.78vh);
						height: min(100vh, 56.25vw);
						}

						#unity-canvas {
						width: 100% !important;
						height: 100% !important;
						outline: none;
						display: block;
						}

						#unity-loading-bar {
						position: absolute;
						top: 50%; left: 50%;
						transform: translate(-50%, -50%);
						text-align: center;
						}
						#unity-logo {
						width: 154px; height: 130px;
						background: url('TemplateData/unity-logo-dark.png') no-repeat center;
						background-size: contain;
						margin: 0 auto 10px;
						}
						#unity-progress-bar-empty {
						width: 280px; height: 8px;
						background: #333; border-radius: 4px; overflow: hidden;
						}
						#unity-progress-bar-full {
						width: 0%; height: 100%;
						background: #f97316; border-radius: 4px;
						}
						#unity-footer {
						position: absolute; bottom: 0; right: 0;
						padding: 5px 8px;
						display: flex; align-items: center; gap: 6px;
						}
						#unity-build-title {
						color: rgba(255,255,255,0.35);
						font-size: 10px; font-family: sans-serif;
						}
						#unity-fullscreen-button {
						width: 24px; height: 24px; cursor: pointer;
						background: url('TemplateData/fullscreen-button.png') no-repeat center;
						background-size: contain; opacity: 0.5;
						}
						#unity-warning {
						position: absolute; top: 0; left: 0;
						width: 100%; z-index: 10; display: none;
						}
						#unity-logo-title-footer { display: none; }
					</style>
				</head>
	<body>

		<div id="rotate-msg">
			<div class="icon">📱</div>
			<p>
				GIRE O CELULAR<br>PARA JOGAR</p>
		</div>

		<div id="unity-container">
			<canvas id="unity-canvas" width="1920" height="1080" tabindex="0"></canvas>
			<div id="unity-loading-bar">
				<div id="unity-logo"></div>
				<div id="unity-progress-bar-empty">
					<div id="unity-progress-bar-full"></div>
				</div>
			</div>
			<div id="unity-warning"></div>
			<div id="unity-footer">
				<div id="unity-logo-title-footer"></div>
				<div id="unity-build-title">Math Shooter</div>
				<div id="unity-fullscreen-button"></div>
			</div>
		</div>

		<script>
			var canvas = document.querySelector("#unity-canvas");
			canvas.style.outline = "none";
			window.addEventListener('load', function() { canvas.focus(); });
			document.addEventListener('click', function() { canvas.focus(); });
			document.addEventListener('keydown', function() { canvas.focus(); });

			function unityShowBanner(msg, type) {
			var wb = document.querySelector("#unity-warning");
			function upd() { wb.style.display = wb.children.length ? 'block' : 'none'; }
			var d = document.createElement('div');
			d.innerHTML = msg;
			wb.appendChild(d);
			if (type == 'error') d.style = 'background:red;padding:10px;color:#fff;';
			else {
			if (type == 'warning') d.style = 'background:orange;padding:10px;';
			setTimeout(function() { wb.removeChild(d); upd(); }, 5000);
			}
			upd();
			}

			var buildUrl = "Build";
			var config = {
			arguments: [],
			dataUrl:            buildUrl + "/docs.data",
			frameworkUrl:       buildUrl + "/docs.framework.js",
			codeUrl:            buildUrl + "/docs.wasm",
			streamingAssetsUrl: "StreamingAssets",
			companyName:        "UTFPR",
			productName:        "Math Shooter",
			productVersion:     "1.0",
			showBanner:         unityShowBanner,
			};

			var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
			if (isMobile) {
			document.querySelector("#unity-container").className = "unity-mobile";
			canvas.className = "unity-mobile";
			}

			document.querySelector("#unity-loading-bar").style.display = "block";

			var script = document.createElement("script");
			script.src = buildUrl + "/docs.loader.js";
			script.onload = () => {
			createUnityInstance(canvas, config, (progress) => {
			document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
			}).then((unityInstance) => {
			document.querySelector("#unity-loading-bar").style.display = "none";
			document.querySelector("#unity-fullscreen-button").onclick = () => {
			unityInstance.SetFullscreen(1);
			};
			setTimeout(function() { canvas.focus(); }, 200);
			}).catch((msg) => { alert(msg); });
			};
			document.body.appendChild(script);
		</script>
	</body>
</html>
