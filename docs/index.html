<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover">
				<meta name="screen-orientation" content="landscape">
					<meta name="mobile-web-app-capable" content="yes">
						<meta name="apple-mobile-web-app-capable" content="yes">
							<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
								<title>MAT-IA - Math Shooter</title>
								<link rel="shortcut icon" href="TemplateData/favicon.ico">
									<link rel="stylesheet" href="TemplateData/style.css">
										<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
											<style>
												:root {
												--laranja:      #f97316;
												--laranja-glow: rgba(249,115,22,0.55);
												--laranja-soft: rgba(249,115,22,0.12);
												--laranja-bord: rgba(249,115,22,0.35);
												--fundo:        #08080f;
												--texto:        #e2e8f0;
												}
												* { margin:0; padding:0; box-sizing:border-box; }
												html { height:-webkit-fill-available; }
												body {
												width:100%; height:100%;
												min-height:100vh; min-height:-webkit-fill-available;
												background:var(--fundo); font-family:'Exo 2',sans-serif;
												color:var(--texto); overflow:hidden;
												user-select:none; -webkit-user-select:none;
												}

												/* girar celular */
												@media screen and (orientation:portrait){
												#rotate-msg { display:flex !important; }
												#unity-container, #mobile-controls { display:none !important; }
												}
												#rotate-msg {
												display:none; position:fixed; inset:0; background:var(--fundo);
												flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:9999;
												}
												#rotate-msg .r-icon { font-size:3.5rem; animation:spinR 2s ease-in-out infinite; }
												@keyframes spinR { 0%{transform:rotate(0deg)} 40%,100%{transform:rotate(90deg)} }
												#rotate-msg p { color:var(--laranja); font-family:'Orbitron',sans-serif; font-size:.9rem; letter-spacing:.15em; text-align:center; }

												/* unity */
												#unity-container { position:fixed; inset:0; }
												#unity-canvas { width:100% !important; height:100% !important; outline:none; }
												#unity-loading-bar { display:none; }
												#unity-warning { position:fixed; top:0; left:0; width:100%; z-index:200; display:none; }
												#unity-footer { position:fixed; bottom:0; right:0; z-index:50; padding:6px 10px; display:flex; align-items:center; gap:8px; }
												#unity-build-title { color:rgba(249,115,22,.3); font-size:.6rem; letter-spacing:.15em; text-transform:uppercase; }
												#unity-fullscreen-button {
												width:26px; height:26px; cursor:pointer;
												background:rgba(255,255,255,.04); border:1px solid rgba(249,115,22,.2);
												border-radius:5px; display:flex; align-items:center; justify-content:center; transition:background .2s;
												}
												#unity-fullscreen-button:hover { background:rgba(249,115,22,.15); }
												#unity-fullscreen-button img { width:13px; opacity:.5; }

												/* loading */
												#custom-loading {
												position:fixed; inset:0; background:var(--fundo);
												display:flex; flex-direction:column; align-items:center; justify-content:center;
												z-index:500; transition:opacity .9s ease;
												}
												#custom-loading.fade-out { opacity:0; pointer-events:none; }
												#stars-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:0; }
												.ld-inner { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:10px; }
												.ld-badge {
												font-family:'Orbitron',sans-serif; font-size:clamp(.55rem,1.8vw,.7rem);
												font-weight:700; letter-spacing:.35em; color:var(--laranja);
												background:var(--laranja-soft); border:1px solid var(--laranja-bord);
												padding:4px 16px; border-radius:20px; text-transform:uppercase;
												opacity:0; animation:fsu .6s ease .2s forwards;
												}
												.ld-title {
												font-family:'Orbitron',sans-serif; font-size:clamp(2.5rem,9vw,5rem); font-weight:900;
												color:#fff; letter-spacing:.04em; line-height:1;
												text-shadow:0 0 40px var(--laranja-glow),0 0 80px rgba(249,115,22,.25);
												opacity:0; animation:fsu .7s ease .5s forwards;
												}
												.ld-title span { color:var(--laranja); }
												.ld-sub {
												font-size:clamp(.65rem,2vw,.85rem); font-weight:600;
												letter-spacing:.38em; color:rgba(255,255,255,.28); text-transform:uppercase;
												opacity:0; animation:fsu .7s ease .8s forwards;
												}
												.ld-ship {
												font-size:clamp(1.8rem,5vw,2.6rem); margin:18px 0 4px;
												filter:drop-shadow(0 0 10px var(--laranja-glow));
												opacity:0; animation:fsu .7s ease 1s forwards,floatS 3s ease-in-out 1.7s infinite;
												}
												@keyframes floatS { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
												.ld-bar-wrap { width:clamp(200px,45vw,360px); opacity:0; animation:fsu .7s ease 1.1s forwards; margin-top:4px; }
												.ld-bar-track { width:100%; height:4px; background:rgba(255,255,255,.06); border-radius:2px; position:relative; }
												.ld-bar-fill {
												height:100%; width:0%;
												background:linear-gradient(90deg,#b04a00,var(--laranja),#ffb040);
												border-radius:2px; transition:width .3s ease; position:relative;
												box-shadow:0 0 10px var(--laranja-glow);
												}
												.ld-bar-fill::after {
												content:''; position:absolute; right:-1px; top:-4px;
												width:5px; height:12px; background:#fff; border-radius:50%;
												box-shadow:0 0 8px 4px var(--laranja-glow); opacity:.9;
												}
												.ld-pct { text-align:right; font-family:'Orbitron',sans-serif; font-size:.6rem; color:rgba(249,115,22,.65); letter-spacing:.1em; margin-top:7px; }
												.ld-tip { font-size:clamp(.6rem,1.8vw,.75rem); color:rgba(255,255,255,.2); letter-spacing:.1em; margin-top:4px; min-height:1.1em; transition:opacity .4s ease; }
												@keyframes fsu { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

												/* controles mobile */
												#mobile-controls {
												display:none; position:fixed; bottom:0; left:0; width:100%; z-index:90;
												padding:0 16px; padding-bottom:max(14px,env(safe-area-inset-bottom)); pointer-events:none;
												}
												.is-mobile #mobile-controls { display:flex !important; }
												.ctrl-row { width:100%; display:flex; align-items:flex-end; justify-content:space-between; pointer-events:none; }
												.ctrl-group { display:flex; gap:10px; pointer-events:all; }
												.ctrl-btn {
												width:68px; height:68px; border-radius:50%;
												border:2px solid var(--laranja-bord); background:var(--laranja-soft);
												backdrop-filter:blur(8px); color:#fff; font-size:1.5rem;
												display:flex; align-items:center; justify-content:center;
												cursor:pointer; touch-action:none;
												transition:background .1s,transform .1s,border-color .1s;
												-webkit-tap-highlight-color:transparent;
												}
												.ctrl-btn.pressed,.ctrl-btn:active { background:rgba(249,115,22,.45); border-color:rgba(249,115,22,.9); transform:scale(.91); }
												.ctrl-btn.fire { width:76px; height:76px; font-size:1.7rem; border-color:rgba(56,189,248,.5); background:rgba(56,189,248,.12); }
												.ctrl-btn.fire.pressed,.ctrl-btn.fire:active { background:rgba(56,189,248,.4); border-color:rgba(56,189,248,.95); }
											</style>
										</head>
	<body>

		<div id="rotate-msg">
			<div class="r-icon">📱</div>
			<p>
				GIRE O CELULAR<br>PARA JOGAR</p>
		</div>

		<div id="custom-loading">
			<canvas id="stars-canvas"></canvas>
			<div class="ld-inner">
				<div class="ld-badge">Projeto MAT-IA</div>
				<div class="ld-title">
					MATH<span>SHOOTER</span>
				</div>
				<div class="ld-sub">Aprenda matemática combatendo</div>
				<div class="ld-ship">🚀</div>
				<div class="ld-bar-wrap">
					<div class="ld-bar-track">
						<div class="ld-bar-fill" id="custom-bar"></div>
					</div>
					<div class="ld-pct" id="custom-pct">0%</div>
				</div>
				<div class="ld-tip" id="loading-tip">Inicializando motores...</div>
			</div>
		</div>

		<div id="unity-container" class="unity-desktop">
			<canvas id="unity-canvas" tabindex="0"></canvas>
			<div id="unity-loading-bar">
				<div id="unity-logo"></div>
				<div id="unity-progress-bar-empty">
					<div id="unity-progress-bar-full"></div>
				</div>
			</div>
			<div id="unity-warning"></div>
			<div id="unity-footer">
				<div id="unity-build-title">Math Shooter</div>
				<div id="unity-fullscreen-button">
					<img src="TemplateData/fullscreen-button.png" alt="FS">
      </div>
			</div>
		</div>

		<div id="mobile-controls">
			<div class="ctrl-row">
				<div class="ctrl-group">
					<button class="ctrl-btn" id="btn-left"  aria-label="Esquerda">◀</button>
					<button class="ctrl-btn" id="btn-right" aria-label="Direita">▶</button>
				</div>
				<div class="ctrl-group">
					<button class="ctrl-btn fire" id="btn-fire" aria-label="Atirar">🔥</button>
				</div>
			</div>
		</div>

		<script>
			/* detecção mobile */
			var isMobileDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
			|| ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
			if (isMobileDevice) document.body.classList.add('is-mobile');

			/* fullscreen */
			function tentarTelaCheia(){
			window.scrollTo(0,1);
			var el=document.documentElement;
			var req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
			if(req) req.call(el).catch(function(){});
			}
			window.addEventListener('load',function(){ setTimeout(tentarTelaCheia,500); });
			document.addEventListener('touchstart',function h(){ tentarTelaCheia(); document.removeEventListener('touchstart',h); },{once:true});

			/* estrelas */
			(function(){
			var c=document.getElementById('stars-canvas'),ctx=c.getContext('2d'),stars=[];
			function resize(){ c.width=innerWidth; c.height=innerHeight; }
			resize(); window.addEventListener('resize',resize);
			for(var i=0;i<160;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.3,speed:Math.random()*.0003+.0001,a:Math.random()*.7+.3=""
      function="" draw=""
 ctx.clearRect(0,0,c.width,c.height=""
 stars.forEach(function(s=""
   s.y+="s.speed"; if(s.y="">
				1){s.y=0;s.x=Math.random();}
				ctx.beginPath(); ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
				ctx.fillStyle='rgba(255,255,255,'+s.a+')'; ctx.fill();
				});
				if(!loadingDone) requestAnimationFrame(draw);
				}
				draw();
				})();

				/* dicas */
				var tips=['Inicializando motores...','Calibrando canhões matemáticos...','Carregando inimigos numéricos...','Preparando as fases...','Sincronizando power-ups...','Ativando escudos...','Quase pronto para o combate!'];
				var tipIdx=0,loadingDone=false;
				var tipEl=document.getElementById('loading-tip');
				var tipTimer=setInterval(function(){
				if(loadingDone){clearInterval(tipTimer);return;}
				tipEl.style.opacity='0';
				setTimeout(function(){ tipIdx=(tipIdx+1)%tips.length; tipEl.textContent=tips[tipIdx]; tipEl.style.opacity='1'; },400);
				},2200);

				var unityInstance=null;
				var canvas=document.querySelector('#unity-canvas');
				canvas.style.outline='none';
				window.addEventListener('load',function(){ canvas.focus(); });
				document.addEventListener('keydown',function(){ canvas.focus(); });

				/* bridge vazia - painéis estão no Unity */
				window.unityBridge={
				esconderPaineis:    function(){},
				mostrarGameOver:    function(score){},
				mostrarFaseCompleta:function(jsonStr){},
				mostrarVitoria:     function(score,pct){}
				};

				/* controles mobile */
				(function(){
				var btnLeft=document.getElementById('btn-left');
				var btnRight=document.getElementById('btn-right');
				var btnFire=document.getElementById('btn-fire');
				function send(m,a){ if(unityInstance) unityInstance.SendMessage('Player',m,a||''); }

				function startL(e){ e.preventDefault(); btnLeft.classList.add('pressed');   send('PressionarEsquerda','true'); }
				function endL(e)  { e.preventDefault(); btnLeft.classList.remove('pressed'); send('PressionarEsquerda','false'); }
				btnLeft.addEventListener('touchstart',startL,{passive:false});
				btnLeft.addEventListener('touchend',endL,{passive:false});
				btnLeft.addEventListener('touchcancel',endL,{passive:false});
				btnLeft.addEventListener('mousedown',startL);
				btnLeft.addEventListener('mouseup',endL);
				btnLeft.addEventListener('mouseleave',endL);

				function startR(e){ e.preventDefault(); btnRight.classList.add('pressed');   send('PressionarDireita','true'); }
				function endR(e)  { e.preventDefault(); btnRight.classList.remove('pressed'); send('PressionarDireita','false'); }
				btnRight.addEventListener('touchstart',startR,{passive:false});
				btnRight.addEventListener('touchend',endR,{passive:false});
				btnRight.addEventListener('touchcancel',endR,{passive:false});
				btnRight.addEventListener('mousedown',startR);
				btnRight.addEventListener('mouseup',endR);
				btnRight.addEventListener('mouseleave',endR);

				function doFire(e){ e.preventDefault(); btnFire.classList.add('pressed'); send('PressionarAtira'); setTimeout(function(){ btnFire.classList.remove('pressed'); },150); }
				btnFire.addEventListener('touchstart',doFire,{passive:false});
				btnFire.addEventListener('mousedown',doFire);
				})();

				/* Unity loader */
				function unityShowBanner(msg,type){
				var wb=document.querySelector('#unity-warning');
				function upd(){ wb.style.display=wb.children.length?'block':'none'; }
				var d=document.createElement('div'); d.innerHTML=msg; wb.appendChild(d);
				if(type=='error') d.style='background:red;padding:10px;color:#fff;';
				else{ if(type=='warning') d.style='background:#f97316;padding:10px;color:#fff;'; setTimeout(function(){ wb.removeChild(d); upd(); },5000); }
				upd();
				}

				var buildUrl='Build';
				var config={
				arguments:[],
				dataUrl:            buildUrl+'/{{{ DATA_FILENAME }}}',
				frameworkUrl:       buildUrl+'/{{{ FRAMEWORK_FILENAME }}}',
				codeUrl:            buildUrl+'/{{{ CODE_FILENAME }}}',
				#if MEMORY_FILENAME
				memoryUrl:          buildUrl+'/{{{ MEMORY_FILENAME }}}',
				#endif
				#if SYMBOLS_FILENAME
				symbolsUrl:         buildUrl+'/{{{ SYMBOLS_FILENAME }}}',
				#endif
				streamingAssetsUrl: 'StreamingAssets',
				companyName:        '{{{ COMPANY_NAME }}}',
				productName:        '{{{ PRODUCT_NAME }}}',
				productVersion:     '{{{ PRODUCT_VERSION }}}',
				showBanner:         unityShowBanner,
				};

				if(isMobileDevice){
				document.querySelector('#unity-container').className='unity-mobile';
				canvas.className='unity-mobile';
				} else {
				canvas.style.width='100%'; canvas.style.height='100%';
				}

				var script=document.createElement('script');
				script.src=buildUrl+'/{{{ LOADER_FILENAME }}}';
				script.onload=function(){
				createUnityInstance(canvas,config,function(progress){
				var pct=Math.round(progress*100);
				document.getElementById('custom-bar').style.width=pct+'%';
				document.getElementById('custom-pct').textContent=pct+'%';
				}).then(function(instance){
				unityInstance=instance;
				loadingDone=true;
				clearInterval(tipTimer);
				document.getElementById('custom-bar').style.width='100%';
				document.getElementById('custom-pct').textContent='100%';
				tipEl.textContent='Pronto para jogar!';
				tipEl.style.opacity='1';
				setTimeout(function(){
				var ld=document.getElementById('custom-loading');
				ld.classList.add('fade-out');
				setTimeout(function(){ ld.style.display='none'; },900);
				},600);
				document.querySelector('#unity-fullscreen-button').onclick=function(){ instance.SetFullscreen(1); };
				setTimeout(function(){ canvas.focus(); },300);
				}).catch(function(msg){ alert(msg); });
				};
				document.body.appendChild(script);
			</script>
	</body>
</html>
